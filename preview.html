  <h1>why I started writing</h1>
  <div class="post-meta">January 1, 2024</div>

<div class="post-body">
  <p>There&rsquo;s a version of understanding that only happens when you have to explain something out loud.</p>

  <p>Rubber duck debugging is the programming version of this &mdash; you describe the problem to an inanimate object and halfway through the sentence you hear yourself say the stupid thing you&rsquo;ve been missing for two hours. The duck doesn&rsquo;t know anything. That&rsquo;s not the point. The point is the act of articulating.</p>

  <p>This blog is the duck.</p>

  <h2>on writing and thinking</h2>

  <p>Most of what I&rsquo;ll write here will be problems I&rsquo;m actively working through. Some of it will be embarrassingly basic. That&rsquo;s fine. The goal isn&rsquo;t to perform competence &mdash; it&rsquo;s to think in public and build the habit of finishing thoughts.</p>

  <blockquote>The gap between knowing and doing is wider than it looks. Writing is one way to cross it.</blockquote>

  <p>If any of it is useful to you, even better.</p>
